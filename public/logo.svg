<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#2563EB" stroke-width="2"/>
  <!-- outer frame (rectangle) -->
  <rect x="28" y="28" width="64" height="50" rx="6" stroke="url(#hl)" stroke-width="3.5" fill="none"/>
  <!-- mountain -->
  <path d="M28 68l16-22 12 14 20-26 16 22" stroke="url(#hl)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- sun dot -->
  <circle cx="66" cy="42" r="5" fill="url(#hl)"/>
  <!-- left compression arrow -->
  <path d="M38 84l-6-6 6-6" stroke="url(#hl)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- right compression arrow -->
  <path d="M82 84l-6-6 6-6" stroke="url(#hl)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom connecting line -->
  <line x1="32" y1="78" x2="88" y2="78" stroke="url(#hl)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
